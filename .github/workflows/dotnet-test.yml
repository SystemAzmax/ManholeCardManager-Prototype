name: .NET Tests

on:
  push:
    branches: [ main, develop, feature/** ]
    paths:
      - 'ManholeCardManager/**'
      - '.github/workflows/dotnet-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ManholeCardManager/**'

jobs:
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        dotnet-version: ['8.0.x']

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test ManholeCardManager/ManholeCardManager.Tests/ManholeCardManager.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/**'
