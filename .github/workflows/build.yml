name: Build Verification

on:
  push:
    branches: [ main, develop, feature/** ]
    paths:
      - 'ManholeCardManager/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ManholeCardManager/**'

jobs:
  build-test-project:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Test Project (Debug)
      run: dotnet build ManholeCardManager/ManholeCardManager.Tests/ManholeCardManager.Tests.csproj --configuration Debug --no-restore --verbosity normal

    - name: Build Test Project (Release)
      run: dotnet build ManholeCardManager/ManholeCardManager.Tests/ManholeCardManager.Tests.csproj --configuration Release --no-restore --verbosity normal
